name: Auto Release
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64, 386, riscv64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Extract version from main.go
        id: version
        run: |
          VERSION=$(grep 'version = "' cmd/sage-wiki/main.go | head -1 | sed 's/.*version = "\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Tidy
        run: go mod tidy

      - name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          go build -tags webui \
            -ldflags "-X main.version=${{ steps.version.outputs.version }} -X main.commit=$COMMIT -X main.date=$DATE" \
            -o sage-wiki-plus ./cmd/sage-wiki
          ls -lh sage-wiki-plus

      - name: Package
        run: |
          V="${{ steps.version.outputs.version }}"
          PKG="sage-wiki-plus_v${V}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar czf "$PKG" sage-wiki-plus
          echo "pkg=$PKG" >> $GITHUB_OUTPUT
          ls -lh "$PKG"
        id: pkg

      - uses: actions/upload-artifact@v4
        with:
          name: sage-wiki-plus_${{ matrix.goos }}_${{ matrix.goarch }}
          path: sage-wiki-plus_*.tar.gz

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from main.go
        id: version
        run: |
          VERSION=$(grep 'version = "' cmd/sage-wiki/main.go | head -1 | sed 's/.*version = "\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          pattern: sage-wiki-plus_*
          merge-multiple: true

      - name: Generate release notes (简体中文)
        id: notes
        run: |
          sha256sum sage-wiki-plus_*.tar.gz > checksums.txt
          V="${{ steps.version.outputs.version }}"
          COMMIT=$(git rev-parse --short HEAD)

          # 生成简体中文更新日志
          cat > release-notes.md << 'EONOTES'
## sage-wiki-plus v${VERSION}

### 更新内容

> 本次更新包含以下变更（commit: ${COMMIT}）

#### 新增
- **版本号管理宪法**：采用语义化版本 MAJOR.MINOR.PATCH，版本号唯一来源为 `cmd/sage-wiki/main.go`
- **`GET /api/sysinfo` 端点**：返回宿主机系统信息（CPU 类型、内存使用、磁盘使用、CPU 温度、系统负载、运行时间、Go 运行时内存统计）
- **`POST /api/models/test` 端点**：支持用指定 provider/模型/API Key 测试 LLM 模型连通性，返回延迟和成功状态

#### 改进
- **Release CI 重构**：版本号从 `main.go` 自动提取，通过 ldflags 注入到二进制，Release tag 采用语义化格式 `v1.1.0`
- **每次 Release 附带简体中文更新日志**

#### 修复
- 编译 flag 添加 `-ldflags` 注入版本元数据（version/commit/date）

### 下载

| 架构 | 文件 |
|------|------|
EONOTES

          for f in sage-wiki-plus_*.tar.gz; do
            ARCH=$(echo "$f" | sed 's/.*_\([^_]*\)_\([^_]*\)\.tar\.gz/\1_\2/')
            echo "| ${ARCH} | \`$f\` |" >> release-notes.md
          done

          cat >> release-notes.md << 'EONOTES'

### 校验

```
EONOTES
          cat checksums.txt >> release-notes.md
          echo '```' >> release-notes.md

          cat release-notes.md

      - name: Delete old releases to keep only latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ls artifacts/
          LATEST_TAG="v${{ steps.version.outputs.version }}"
          echo "Keeping: $LATEST_TAG"
          for tag in $(gh release list --json tagName --jq '.[].tagName' --limit 100); do
            if [ "$tag" != "$LATEST_TAG" ]; then
              echo "Deleting old release: $tag"
              gh release delete "$tag" --cleanup-tag --yes || true
            fi
          done
          # Also delete old tags without releases
          for tag in $(git tag -l); do
            if [ "$tag" != "$LATEST_TAG" ]; then
              echo "Deleting old tag: $tag"
              git push origin ":refs/tags/$tag" || true
            fi
          done

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ steps.version.outputs.version }}"
          gh release create "v${V}" \
            --title "sage-wiki-plus v${V}" \
            --notes-file release-notes.md \
            sage-wiki-plus_*.tar.gz checksums.txt