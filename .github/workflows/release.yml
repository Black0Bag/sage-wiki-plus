name: Auto Release
on:
  push:
    branches: [main, master]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64, 386, riscv64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Tidy
        run: go mod tidy
      - name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BINARY="sage-wiki-plus-${{ matrix.goos }}-${{ matrix.goarch }}"
          go build -tags webui -o "$BINARY" ./cmd/sage-wiki
          echo "binary=$BINARY" >> $GITHUB_OUTPUT
          ls -lh "$BINARY"
        id: build
      - uses: actions/upload-artifact@v4
        with:
          name: sage-wiki-plus-${{ matrix.goos }}-${{ matrix.goarch }}
          path: sage-wiki-plus-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: sage-wiki-plus-*
          merge-multiple: true
      - name: Checksums
        run: |
          sha256sum sage-wiki-plus-* > checksums.txt
          cat checksums.txt
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST_TAG=$(git tag --sort=-v:refname | head -1 || echo "")
          if [ -n "$LAST_TAG" ]; then
            NEW_COUNT=$(git log "$LAST_TAG"..HEAD --oneline 2>/dev/null | wc -l)
            echo "Changes: $NEW_COUNT"
            if [ "$NEW_COUNT" -eq 0 ]; then exit 0; fi
          fi
          VERSION="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          gh release create "$VERSION" \
            --title "sage-wiki-plus $VERSION" \
            --notes "Multi-arch build: linux/amd64, linux/arm64, linux/386, linux/riscv64" \
            sage-wiki-plus-* checksums.txt
