name: Auto Release
on:
  push:
    branches: [main, master]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64, 386, riscv64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Tidy
        run: go mod tidy
      - name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -tags webui -o sage-wiki-plus ./cmd/sage-wiki
          ls -lh sage-wiki-plus
      - name: Package
        run: |
          VERSION="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          PKG="sage-wiki-plus_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar czf "$PKG" sage-wiki-plus
          echo "pkg=$PKG" >> $GITHUB_OUTPUT
          ls -lh "$PKG"
        id: pkg
      - uses: actions/upload-artifact@v4
        with:
          name: sage-wiki-plus_${{ matrix.goos }}_${{ matrix.goarch }}
          path: sage-wiki-plus_*.tar.gz

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: sage-wiki-plus_*
          merge-multiple: true
      - name: Generate release assets
        run: |
          sha256sum sage-wiki-plus_*.tar.gz > checksums.txt
          {
            echo "## sage-wiki-plus $(git rev-parse --short HEAD)"
            echo ""
            echo "### Downloads"
            for f in sage-wiki-plus_*.tar.gz; do
              echo "- \`$f\`"
            done
            echo ""
            echo "### Checksums"
            echo '```'
            cat checksums.txt
            echo '```'
          } > release-notes.md
          cat release-notes.md
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          gh release create "v${VERSION}" \
            --title "sage-wiki-plus v${VERSION}" \
            --notes-file release-notes.md \
            sage-wiki-plus_*.tar.gz checksums.txt
