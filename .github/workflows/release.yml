name: Auto Release

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Configure Git
        run: |
          git config user.name "Black0Bag"
          git config user.email "black0bag@users.noreply.github.com"

      - name: Check for changes and build
        id: check
        run: |
          LAST_TAG=$(git tag --sort=-v:refname | head -1 || echo "")
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT

          if [ -n "$LAST_TAG" ]; then
            NEW_COMMITS=$(git log "$LAST_TAG"..HEAD --oneline 2>/dev/null | wc -l)
          else
            NEW_COMMITS=$(git log --oneline 2>/dev/null | wc -l)
          fi

          echo "new_commits=$NEW_COMMITS" >> $GITHUB_OUTPUT
          echo "New commits since last tag: $NEW_COMMITS"

          if [ "$NEW_COMMITS" -eq 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Build binary
        if: steps.check.outputs.skip != 'true'
        run: |
          go build -tags webui -o sage-wiki-plus ./cmd/sage-wiki
          ls -lh sage-wiki-plus

      - name: Create Release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          echo "Creating release $VERSION"

          tar czf "sage-wiki-plus-${VERSION}.tar.gz" sage-wiki-plus

          LAST_TAG="${{ steps.check.outputs.last_tag }}"
          if [ -n "$LAST_TAG" ]; then
            NOTES=$(git log "$LAST_TAG"..HEAD --oneline --no-decorate 2>/dev/null | head -50)
          else
            NOTES=$(git log --oneline --no-decorate 2>/dev/null | head -50)
          fi

          gh release create "$VERSION" \
            --title "sage-wiki-plus $VERSION" \
            --notes "## Auto Release

### Changes
$NOTES

---
Built at $(date '+%Y-%m-%d %H:%M:%S %Z')" \
            "sage-wiki-plus-${VERSION}.tar.gz" \
            sage-wiki-plus
