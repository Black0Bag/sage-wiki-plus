name: Auto Release

on:
  schedule:
    # 每 30 分钟检测一次变更
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Configure Git
        run: |
          git config user.name "Black0Bag"
          git config user.email "black0bag@users.noreply.github.com"

      - name: Check for changes and auto-release
        run: |
          chmod +x scripts/auto-release.sh

          # 获取上次 Release
          LAST_TAG=$(git tag --sort=-v:refname | head -1 || echo "")
          echo "Last release tag: $LAST_TAG"

          # 计算新 commit
          if [ -n "$LAST_TAG" ]; then
            NEW_COMMITS=$(git log "$LAST_TAG"..HEAD --oneline 2>/dev/null | wc -l)
          else
            NEW_COMMITS=$(git log --oneline 2>/dev/null | wc -l)
          fi

          echo "New commits: $NEW_COMMITS"

          if [ "$NEW_COMMITS" -eq 0 ]; then
            echo "No changes, skipping"
            exit 0
          fi

          # 编译
          echo "Building..."
          go build -tags webui -o sage-wiki-plus .

          # 生成版本号
          VERSION="v$(date +'%Y.%-m.%-d')-$(git rev-parse --short HEAD)"
          echo "Version: $VERSION"

          # 打包
          tar czf "sage-wiki-plus-${VERSION}.tar.gz" sage-wiki-plus

          # 生成变更日志
          if [ -n "$LAST_TAG" ]; then
            NOTES=$(git log "$LAST_TAG"..HEAD --oneline --no-decorate 2>/dev/null | head -50)
          else
            NOTES=$(git log --oneline --no-decorate 2>/dev/null | head -50)
          fi

          # 创建 Release
          gh release create "$VERSION" \
            --title "sage-wiki-plus $VERSION" \
            --notes "## 自动发布

### 变更
$NOTES

---
自动编译于 $(date '+%Y-%m-%d %H:%M:%S %Z')" \
            "sage-wiki-plus-${VERSION}.tar.gz" \
            sage-wiki-plus

          echo "Release $VERSION created"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
