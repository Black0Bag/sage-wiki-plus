name: Auto Release
on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64, 386, riscv64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Extract version from main.go
        id: version
        run: |
          V=$(grep 'version = "' cmd/sage-wiki/main.go | head -1 | sed 's/.*version = "\([^"]*\)".*/\1/')
          echo "version=$V" >> $GITHUB_OUTPUT
          echo "Extracted version: $V"

      - name: Tidy
        run: go mod tidy

      - name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          go build -tags webui \
            -ldflags "-X main.version=${{ steps.version.outputs.version }} -X main.commit=$COMMIT -X main.date=$DATE" \
            -o sage-wiki-plus ./cmd/sage-wiki
          ls -lh sage-wiki-plus

      - name: Package
        run: |
          V="${{ steps.version.outputs.version }}"
          PKG="sage-wiki-plus_v${V}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar czf "$PKG" sage-wiki-plus
          echo "pkg=$PKG" >> $GITHUB_OUTPUT
          ls -lh "$PKG"
        id: pkg

      - uses: actions/upload-artifact@v4
        with:
          name: sage-wiki-plus_${{ matrix.goos }}_${{ matrix.goarch }}
          path: sage-wiki-plus_*.tar.gz

  release:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from main.go
        id: version
        run: |
          V=$(grep 'version = "' cmd/sage-wiki/main.go | head -1 | sed 's/.*version = "\([^"]*\)".*/\1/')
          echo "version=$V" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          pattern: sage-wiki-plus_*
          merge-multiple: true

      - name: Generate release notes
        run: |
          sha256sum sage-wiki-plus_*.tar.gz > checksums.txt
          V="${{ steps.version.outputs.version }}"
          COMMIT="$(git rev-parse --short HEAD)"

          cat > release-notes.md << ENDHEADER
          ## sage-wiki-plus v${V}

          ### 更新内容

          > 本次更新包含以下变更（commit: ${COMMIT}）

          #### 新增
          - **版本号管理宪法**：采用语义化版本 MAJOR.MINOR.PATCH，唯一来源为 \`cmd/sage-wiki/main.go\`
          - **\`GET /api/sysinfo\`**：宿主机系统信息（CPU/内存/磁盘/温度/负载/Go运行时统计）
          - **\`POST /api/models/test\`**：LLM 模型连通性测试（返回延迟与成功状态）

          #### 改进
          - Release CI 重构：版本号从 main.go 自动提取，tag 格式改为 \`v${V}\`
          - 每次 Release 附带简体中文更新日志

          #### 修复
          - 编译 flag 添加 \`-ldflags\` 注入 version/commit/date 元数据

          ### 下载

          | 架构 | 文件 |
          |------|------|
          ENDHEADER

          for f in sage-wiki-plus_*.tar.gz; do
            ARCH=$(echo "$f" | sed 's/.*_\([^_]*\)_\([^_]*\)\.tar\.gz/\1_\2/')
            echo "| ${ARCH} | \`$f\` |" >> release-notes.md
          done

          echo "" >> release-notes.md
          echo "### 校验" >> release-notes.md
          echo "" >> release-notes.md
          echo '```' >> release-notes.md
          cat checksums.txt >> release-notes.md
          echo '```' >> release-notes.md

          cat release-notes.md

      - name: Delete old releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST_TAG="v${{ steps.version.outputs.version }}"
          echo "Keeping: $LATEST_TAG"
          for tag in $(gh release list --json tagName --jq '.[].tagName' --limit 100); do
            if [ "$tag" != "$LATEST_TAG" ]; then
              echo "Deleting old release: $tag"
              gh release delete "$tag" --cleanup-tag --yes || true
            fi
          done

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          V="${{ steps.version.outputs.version }}"
          gh release create "v${V}" \
            --title "sage-wiki-plus v${V}" \
            --notes-file release-notes.md \
            sage-wiki-plus_*.tar.gz checksums.txt