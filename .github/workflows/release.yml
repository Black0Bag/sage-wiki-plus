name: Auto Release
on:
  push:
    branches: [main, master]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64, 386, riscv64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Tidy
        run: go mod tidy
      - name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -tags webui -o sage-wiki-plus ./cmd/sage-wiki
          ls -lh sage-wiki-plus
      - name: Package
        run: |
          VERSION="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          PKG="sage-wiki-plus_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz"
          tar czf "$PKG" sage-wiki-plus
          echo "pkg=$PKG" >> $GITHUB_OUTPUT
          ls -lh "$PKG"
        id: pkg
      - uses: actions/upload-artifact@v4
        with:
          name: sage-wiki-plus_${{ matrix.goos }}_${{ matrix.goarch }}
          path: sage-wiki-plus_*.tar.gz

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Install Android SDK
        run: |
          export ANDROID_HOME=$ANDROID_SDK_ROOT
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>&1 || true
      - name: List SDK
        run: |
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls $ANDROID_SDK_ROOT/platforms/ 2>/dev/null || echo "No platforms dir"
          ls $ANDROID_SDK_ROOT/build-tools/ 2>/dev/null || echo "No build-tools dir"
      - name: Build APK
        working-directory: android
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1
      - name: Sign APK (if keystore available)
        working-directory: android
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "Keystore found, signing..."
            echo "$KEYSTORE_BASE64" | base64 -d > app/keystore.jks
            ./gradlew assembleRelease --no-daemon --stacktrace \
              -Pandroid.injected.signing.store.file=app/keystore.jks \
              -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
              -Pandroid.injected.signing.key.alias=${{ secrets.KEYSTORE_ALIAS }} \
              -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
          else
            echo "No keystore set, using unsigned APK"
          fi
      - name: List APK
        working-directory: android
        run: |
          find . -name "*.apk" -o -name "*.aab" | head -5
          ls -lh app/build/outputs/ 2>/dev/null || echo "No outputs dir"
      - uses: actions/upload-artifact@v4
        with:
          name: sage-wiki-plus-android
          path: android/app/build/outputs/apk/*/release/*.apk

  release:
    needs: [build, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: sage-wiki-plus_*
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sage-wiki-plus-android
          path: android-apk
      - name: Generate release assets
        run: |
          sha256sum sage-wiki-plus_*.tar.gz > checksums.txt
          APK="android-apk/app-release-unsigned.apk"
          if [ ! -f "$APK" ]; then
            APK=$(find android-apk -name "*.apk" | head -1)
          fi
          if [ -f "$APK" ]; then
            cp "$APK" sage-wiki-plus-android.apk
          fi
          {
            echo "## sage-wiki-plus $(git rev-parse --short HEAD)"
            echo ""
            echo "### Downloads"
            for f in sage-wiki-plus_*.tar.gz; do
              echo "- \`$f\`"
            done
            if [ -f sage-wiki-plus-android.apk ]; then
              echo "- \`sage-wiki-plus-android.apk\` (Android APK)"
            fi
            echo ""
            echo "### Checksums"
            echo '```'
            cat checksums.txt
            if [ -f sage-wiki-plus-android.apk ]; then
              sha256sum sage-wiki-plus-android.apk
            fi
            echo '```'
          } > release-notes.md
          cat release-notes.md
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          ASSETS="sage-wiki-plus_*.tar.gz checksums.txt"
          if [ -f sage-wiki-plus-android.apk ]; then
            ASSETS="$ASSETS sage-wiki-plus-android.apk"
          fi
          gh release create "$VERSION" \
            --title "sage-wiki-plus $VERSION" \
            --notes-file release-notes.md \
            $ASSETS
