name: Auto Release
on:
  push:
    branches: [main, master]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build
        run: go build -tags webui -o sage-wiki-plus ./cmd/sage-wiki
      - name: Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LAST_TAG=$(git tag --sort=-v:refname | head -1 || echo "")
          if [ -n "$LAST_TAG" ]; then
            NEW_COUNT=$(git log "$LAST_TAG"..HEAD --oneline 2>/dev/null | wc -l)
            echo "Changes: $NEW_COUNT"
            if [ "$NEW_COUNT" -eq 0 ]; then exit 0; fi
            NOTES=$(git log "$LAST_TAG"..HEAD --oneline --no-decorate 2>/dev/null | head -50)
          else
            echo "No previous tag"
            NOTES=$(git log --oneline --no-decorate 2>/dev/null | head -50)
          fi
          VERSION="v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)"
          gh release create "$VERSION" \
            --title "sage-wiki-plus $VERSION" \
            --notes "Auto build $VERSION" \
            sage-wiki-plus
